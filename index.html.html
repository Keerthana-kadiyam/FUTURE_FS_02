<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LeadFlow — Client Lead Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ===== CSS RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:hsl(220,20%,97%);--fg:hsl(224,30%,15%);
  --card:hsl(0,0%,100%);--card-fg:hsl(224,30%,15%);
  --primary:hsl(230,80%,56%);--primary-fg:hsl(0,0%,100%);
  --secondary:hsl(220,14%,92%);--secondary-fg:hsl(224,30%,15%);
  --muted:hsl(220,14%,94%);--muted-fg:hsl(220,10%,46%);
  --accent:hsl(168,70%,42%);--accent-fg:hsl(0,0%,100%);
  --border:hsl(220,14%,89%);--ring:hsl(230,80%,56%);
  --destructive:hsl(0,72%,55%);--destructive-fg:hsl(0,0%,100%);
  --success:hsl(152,60%,44%);--warning:hsl(38,92%,55%);--info:hsl(200,80%,50%);
  --gradient-primary:linear-gradient(135deg,hsl(230,80%,56%),hsl(260,70%,60%));
  --gradient-accent:linear-gradient(135deg,hsl(168,70%,42%),hsl(190,70%,50%));
  --gradient-hero:linear-gradient(135deg,hsl(230,80%,56%),hsl(168,70%,42%));
  --shadow-card:0 1px 3px 0 hsl(0 0% 0%/.04),0 1px 2px -1px hsl(0 0% 0%/.04);
  --shadow-elevated:0 10px 25px -5px hsl(0 0% 0%/.08),0 8px 10px -6px hsl(0 0% 0%/.04);
  --radius:0.75rem;
}
html.dark{
  --bg:hsl(224,30%,8%);--fg:hsl(220,14%,92%);
  --card:hsl(224,25%,12%);--card-fg:hsl(220,14%,92%);
  --primary:hsl(230,80%,62%);--primary-fg:hsl(0,0%,100%);
  --secondary:hsl(224,20%,18%);--secondary-fg:hsl(220,14%,92%);
  --muted:hsl(224,20%,16%);--muted-fg:hsl(220,10%,55%);
  --accent:hsl(168,65%,48%);--accent-fg:hsl(0,0%,100%);
  --border:hsl(224,20%,20%);--ring:hsl(230,80%,62%);
  --destructive:hsl(0,62%,50%);
  --success:hsl(152,55%,48%);--warning:hsl(38,88%,58%);--info:hsl(200,75%,55%);
  --gradient-primary:linear-gradient(135deg,hsl(230,80%,62%),hsl(260,65%,65%));
  --shadow-card:0 1px 3px 0 hsl(0 0% 0%/.15),0 1px 2px -1px hsl(0 0% 0%/.1);
  --shadow-elevated:0 10px 25px -5px hsl(0 0% 0%/.25),0 8px 10px -6px hsl(0 0% 0%/.15);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--fg);line-height:1.5;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button,input,select,textarea{font-family:inherit;font-size:inherit;border:none;outline:none;background:none;color:inherit}
button{cursor:pointer}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.animate-fade-in{animation:fadeIn .4s ease-out both}
.animate-scale-in{animation:scaleIn .3s ease-out both}
.animate-count-up{animation:countUp .5s ease-out both}

/* ===== UTILITIES ===== */
.gradient-primary{background:var(--gradient-primary)}
.gradient-hero{background:var(--gradient-hero)}
.shadow-card{box-shadow:var(--shadow-card)}
.shadow-elevated{box-shadow:var(--shadow-elevated)}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.line-clamp-1{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}

/* ===== INPUT ===== */
.input{width:100%;padding:.625rem 1rem;border-radius:var(--radius);background:var(--secondary);border:1px solid var(--border);color:var(--fg);font-size:.875rem;transition:box-shadow .2s,border-color .2s}
.input::placeholder{color:var(--muted-fg)}
.input:focus{box-shadow:0 0 0 2px var(--ring);border-color:var(--ring)}
.input-icon{padding-left:2.5rem}
textarea.input{resize:none}
select.input{cursor:pointer;appearance:none;padding-right:2rem}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:var(--radius);font-size:.875rem;font-weight:600;transition:opacity .2s,background .2s,color .2s}
.btn-primary{background:var(--gradient-primary);color:var(--primary-fg)}
.btn-primary:hover{opacity:.9}
.btn-ghost{color:var(--muted-fg)}
.btn-ghost:hover{background:var(--secondary);color:var(--fg)}
.btn-danger{color:var(--destructive)}
.btn-danger:hover{background:hsl(0 72% 55%/.1)}
.btn-sm{padding:.375rem .75rem;font-size:.75rem}

/* ===== BADGE ===== */
.badge{display:inline-block;padding:.125rem .625rem;border-radius:9999px;font-size:.75rem;font-weight:600}
.badge-new{background:hsl(200 80% 50%/.15);color:var(--info)}
.badge-contacted{background:hsl(38 92% 55%/.15);color:var(--warning)}
.badge-converted{background:hsl(152 60% 44%/.15);color:var(--success)}
.badge-lost{background:hsl(0 72% 55%/.15);color:var(--destructive)}

/* ===== LOGIN PAGE ===== */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;position:relative}
#loginPage .bg-overlay{position:absolute;inset:0;background:var(--gradient-hero);opacity:.05}
.login-card{position:relative;width:100%;max-width:28rem}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .icon-box{display:inline-flex;align-items:center;justify-content:center;width:4rem;height:4rem;border-radius:1rem;background:var(--gradient-primary);margin-bottom:1rem}
.login-logo .icon-box svg{width:2rem;height:2rem;color:var(--primary-fg)}
.login-logo h1{font-size:1.875rem;font-weight:700}
.login-logo p{color:var(--muted-fg);margin-top:.25rem}
.login-form-card{background:var(--card);border-radius:1rem;box-shadow:var(--shadow-elevated);padding:2rem;border:1px solid var(--border)}
.login-form-card form>*+*{margin-top:1.25rem}
.login-form-card label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.375rem}
.login-form-card .field{position:relative}
.login-form-card .field svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--muted-fg)}
.login-hint{text-align:center;font-size:.75rem;color:var(--muted-fg);margin-top:1rem}

/* ===== SIDEBAR ===== */
.sidebar{position:fixed;top:0;left:0;height:100%;width:16rem;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transform:translateX(-100%);transition:transform .3s ease}
.sidebar.open{transform:translateX(0)}
@media(min-width:1024px){.sidebar{transform:translateX(0)}}
.sidebar-overlay{position:fixed;inset:0;background:hsl(224 30% 15%/.2);z-index:40;display:none}
.sidebar-overlay.show{display:block}
@media(min-width:1024px){.sidebar-overlay{display:none!important}}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem;border-bottom:1px solid var(--border)}
.sidebar-header .brand{display:flex;align-items:center;gap:.625rem}
.sidebar-header .brand .icon{width:2.25rem;height:2.25rem;border-radius:.75rem;background:var(--gradient-primary);display:flex;align-items:center;justify-content:center}
.sidebar-header .brand .icon svg{width:1.25rem;height:1.25rem;color:var(--primary-fg)}
.sidebar-header .brand span{font-size:1.125rem;font-weight:700}
.sidebar-close{display:none;color:var(--muted-fg)}
.sidebar-close:hover{color:var(--fg)}
@media(max-width:1023px){.sidebar-close{display:block}}
.sidebar-nav{flex:1;padding:.75rem;display:flex;flex-direction:column;gap:.25rem}
.nav-btn{width:100%;display:flex;align-items:center;gap:.75rem;padding:.625rem 1rem;border-radius:var(--radius);font-size:.875rem;font-weight:500;color:var(--muted-fg);transition:all .2s}
.nav-btn:hover{color:var(--fg);background:var(--secondary)}
.nav-btn.active{background:var(--gradient-primary);color:var(--primary-fg);box-shadow:var(--shadow-card)}
.nav-btn svg{width:1.25rem;height:1.25rem}
.sidebar-footer{padding:.75rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.25rem}

/* ===== MAIN LAYOUT ===== */
.main{min-height:100vh}
@media(min-width:1024px){.main{margin-left:16rem}}
.mobile-header{display:flex;align-items:center;gap:.75rem;padding:1rem;border-bottom:1px solid var(--border);background:var(--card);position:sticky;top:0;z-index:30}
@media(min-width:1024px){.mobile-header{display:none}}
.mobile-header button svg{width:1.5rem;height:1.5rem}
.mobile-header span{font-weight:700}
.content{padding:1rem;max-width:72rem}
@media(min-width:640px){.content{padding:1.5rem}}
@media(min-width:1024px){.content{padding:2rem}}
.page-title{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem}

/* ===== DASHBOARD ===== */
.stats-grid{display:grid;gap:1rem;grid-template-columns:1fr}
@media(min-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1280px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:1.25rem;box-shadow:var(--shadow-card);transition:box-shadow .2s}
.stat-card:hover{box-shadow:var(--shadow-elevated)}
.stat-card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.stat-card .top span{font-size:.875rem;font-weight:500;color:var(--muted-fg)}
.stat-card .top .icon{width:2.5rem;height:2.5rem;border-radius:.75rem;display:flex;align-items:center;justify-content:center}
.stat-card .top .icon svg{width:1.25rem;height:1.25rem;color:var(--primary-fg)}
.stat-card .value{font-size:1.875rem;font-weight:700}
.icon-primary{background:var(--gradient-primary)}
.icon-success{background:var(--success)}
.icon-warning{background:var(--warning)}
.icon-destructive{background:var(--destructive)}

.recent-card{background:var(--card);border-radius:1rem;border:1px solid var(--border);box-shadow:var(--shadow-card);margin-top:1.5rem}
.recent-card .header{padding:1.25rem;border-bottom:1px solid var(--border);font-size:1.125rem;font-weight:600}
.recent-card .empty{padding:2.5rem;text-align:center;color:var(--muted-fg)}
.recent-item{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);transition:background .15s}
.recent-item:last-child{border-bottom:none}
.recent-item:hover{background:hsl(220 14% 92%/.5)}
html.dark .recent-item:hover{background:hsl(224 20% 18%/.5)}
.recent-item .name{font-weight:500}
.recent-item .company{font-size:.875rem;color:var(--muted-fg)}

/* ===== LEADS PAGE ===== */
.leads-toolbar{display:flex;flex-direction:column;gap:.75rem}
@media(min-width:640px){.leads-toolbar{flex-direction:row;align-items:center}}
.leads-toolbar .search-wrap{position:relative;flex:1}
.leads-toolbar .search-wrap svg{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);width:1rem;height:1rem;color:var(--muted-fg)}
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap}
.filter-btn{padding:.5rem .875rem;border-radius:var(--radius);font-size:.75rem;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted-fg);transition:all .2s}
.filter-btn:hover{color:var(--fg)}
.filter-btn.active{background:var(--gradient-primary);color:var(--primary-fg);border-color:transparent}

.lead-card{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:1.25rem;box-shadow:var(--shadow-card);transition:box-shadow .2s;margin-top:.75rem}
.lead-card:hover{box-shadow:var(--shadow-elevated)}
.lead-card-inner{display:flex;flex-direction:column;gap:.75rem}
@media(min-width:640px){.lead-card-inner{flex-direction:row;align-items:center;justify-content:space-between}}
.lead-info .name-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem}
.lead-info .name-row h3{font-weight:600}
.lead-info .detail{font-size:.875rem;color:var(--muted-fg)}
.lead-info .notes{font-size:.75rem;color:var(--muted-fg);margin-top:.25rem}
.lead-actions{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.lead-actions .status-select{position:relative}
.lead-actions .status-select select{appearance:none;padding:.375rem .75rem;padding-right:1.75rem;border-radius:.5rem;background:var(--secondary);border:1px solid var(--border);font-size:.75rem;font-weight:500;cursor:pointer}
.lead-actions .status-select svg{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);width:.75rem;height:.75rem;color:var(--muted-fg);pointer-events:none}
.icon-btn{padding:.5rem;border-radius:.5rem;color:var(--muted-fg);transition:all .2s}
.icon-btn:hover{color:var(--fg);background:var(--secondary)}
.icon-btn.delete:hover{color:var(--destructive);background:hsl(0 72% 55%/.1)}
.icon-btn svg{width:1rem;height:1rem}

.empty-state{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:4rem 1rem;text-align:center;margin-top:.75rem}
.empty-state p{color:var(--muted-fg);font-size:1.125rem}

/* ===== FOLLOW-UPS ===== */
.followup-section h3{font-size:1.125rem;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:.5rem}
.followup-section h3 .count{font-size:.875rem;font-weight:400;color:var(--muted-fg)}
.followup-section+.followup-section{margin-top:2rem}
.followup-card{background:var(--card);border-radius:.75rem;border:1px solid var(--border);padding:1rem;box-shadow:var(--shadow-card);transition:box-shadow .2s;margin-bottom:.5rem}
.followup-card:hover{box-shadow:var(--shadow-elevated)}
.followup-card.overdue{border-color:hsl(0 72% 55%/.3)}
.followup-card .row{display:flex;align-items:center;justify-content:space-between}
.followup-card .row .right{display:flex;align-items:center;gap:.75rem}
.followup-card .date{font-size:.75rem;font-weight:500}
.followup-card .date.overdue-text{color:var(--destructive)}
.followup-card .notes{font-size:.75rem;color:var(--muted-fg);margin-top:.5rem}
.followup-empty{background:var(--card);border-radius:1rem;border:1px solid var(--border);padding:4rem 1rem;text-align:center}
.followup-empty svg{width:3rem;height:3rem;color:var(--muted-fg);margin:0 auto .75rem}
.followup-empty p{color:var(--muted-fg)}
.followup-empty .sub{font-size:.875rem;margin-top:.25rem}
.followup-none{font-size:.875rem;color:var(--muted-fg);padding:1rem;background:var(--card);border-radius:.75rem;border:1px solid var(--border)}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:hsl(224 30% 15%/.2);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--card);border-radius:1rem;border:1px solid var(--border);box-shadow:var(--shadow-elevated);width:100%;max-width:32rem;max-height:90vh;overflow-y:auto;animation:scaleIn .3s ease-out}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1.125rem;font-weight:600}
.modal-header button{color:var(--muted-fg);transition:color .2s}
.modal-header button:hover{color:var(--fg)}
.modal-header button svg{width:1.25rem;height:1.25rem}
.modal-body{padding:1.25rem}
.modal-body .grid2{display:grid;grid-template-columns:1fr;gap:1rem}
@media(min-width:640px){.modal-body .grid2{grid-template-columns:repeat(2,1fr)}}
.modal-body label{display:block;font-size:.875rem;font-weight:500;margin-bottom:.25rem}
.modal-body .full{grid-column:1/-1}
.modal-footer{display:flex;justify-content:flex-end;gap:.75rem;padding:.5rem 0 0}

/* ===== SVG ICONS ===== */
svg{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="animate-scale-in">
  <div class="bg-overlay"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-box">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>
      <h1>LeadFlow</h1>
      <p>Client Lead Management</p>
    </div>
    <div class="login-form-card">
      <form id="loginForm">
        <div>
          <label>Email</label>
          <div class="field">
            <svg width="16" height="16" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="email" class="input input-icon" placeholder="admin@leadflow.io" required/>
          </div>
        </div>
        <div>
          <label>Password</label>
          <div class="field">
            <svg width="16" height="16" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" class="input input-icon" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Sign In</button>
      </form>
      <p class="login-hint">Enter any email &amp; password to demo</p>
    </div>
  </div>
</div>

<!-- ===== APP SHELL ===== -->
<div id="appShell" style="display:none">
  <!-- Sidebar Overlay -->
  <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="icon">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <span>LeadFlow</span>
      </div>
      <button class="sidebar-close" onclick="closeSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg width="20" height="20" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" data-page="leads" onclick="navigate('leads')">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Leads
      </button>
      <button class="nav-btn" data-page="followups" onclick="navigate('followups')">
        <svg width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Follow-ups
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-btn" onclick="toggleDark()">
        <svg id="darkIcon" width="20" height="20" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="darkLabel">Dark Mode</span>
      </button>
      <button class="nav-btn btn-danger" onclick="logout()" style="color:var(--destructive)">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="mobile-header">
      <button onclick="openSidebar()"><svg width="24" height="24" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span>LeadFlow</span>
    </div>
    <div class="content">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page animate-fade-in"></div>
      <!-- Leads Page -->
      <div id="page-leads" class="page animate-fade-in" style="display:none"></div>
      <!-- Follow-ups Page -->
      <div id="page-followups" class="page animate-fade-in" style="display:none"></div>
    </div>
  </div>
</div>

<!-- ===== MODAL (Add/Edit Lead) ===== -->
<div id="leadModal" class="modal-overlay" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modalTitle">Add New Lead</h3>
      <button onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <form id="leadForm">
        <div class="grid2">
          <div>
            <label>Name *</label>
            <input id="f-name" class="input" placeholder="John Doe" required/>
          </div>
          <div>
            <label>Email *</label>
            <input id="f-email" type="email" class="input" placeholder="john@example.com" required/>
          </div>
          <div>
            <label>Phone</label>
            <input id="f-phone" class="input" placeholder="+1 234 567 890"/>
          </div>
          <div>
            <label>Company</label>
            <input id="f-company" class="input" placeholder="Acme Inc."/>
          </div>
          <div>
            <label>Status</label>
            <select id="f-status" class="input">
              <option>New</option><option>Contacted</option><option>Converted</option><option>Lost</option>
            </select>
          </div>
          <div>
            <label>Follow-up Date</label>
            <input id="f-followup" type="date" class="input"/>
          </div>
          <div class="full">
            <label>Notes</label>
            <textarea id="f-notes" class="input" rows="3" placeholder="Any relevant notes..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modalSubmitBtn">Add Lead</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
/* ===== STATE ===== */
let currentPage = 'dashboard';
let editingId = null;
let searchQuery = '';
let statusFilter = 'All';

/* ===== LOCALSTORAGE HELPERS ===== */
function getLeads() {
  try { return JSON.parse(localStorage.getItem('crm_leads') || '[]'); } catch { return []; }
}
function saveLeads(leads) { localStorage.setItem('crm_leads', JSON.stringify(leads)); }
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ===== AUTH ===== */
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  localStorage.setItem('crm_logged_in', '1');
  showApp();
});

function showApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appShell').style.display = 'block';
  // Check dark mode
  if (localStorage.getItem('crm_dark') === '1') document.documentElement.classList.add('dark');
  updateDarkUI();
  navigate('dashboard');
  // Follow-up reminder
  const today = new Date().toISOString().split('T')[0];
  const overdue = getLeads().filter(l => l.followUpDate && l.followUpDate <= today && l.status !== 'Converted' && l.status !== 'Lost');
  if (overdue.length > 0) setTimeout(() => alert('You have ' + overdue.length + ' follow-up reminder(s) due today or overdue!'), 400);
}

function logout() {
  localStorage.removeItem('crm_logged_in');
  document.getElementById('appShell').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

if (localStorage.getItem('crm_logged_in') === '1') showApp();

/* ===== DARK MODE ===== */
function toggleDark() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('crm_dark', isDark ? '1' : '0');
  updateDarkUI();
}
function updateDarkUI() {
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById('darkLabel').textContent = isDark ? 'Light Mode' : 'Dark Mode';
  document.getElementById('darkIcon').innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}

/* ===== SIDEBAR ===== */
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

/* ===== NAVIGATION ===== */
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-' + page).style.display = 'block';
  document.querySelectorAll('.nav-btn[data-page]').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  closeSidebar();
  render();
}

/* ===== BADGE HTML ===== */
function badgeHTML(status) {
  const cls = { New: 'badge-new', Contacted: 'badge-contacted', Converted: 'badge-converted', Lost: 'badge-lost' };
  return '<span class="badge ' + (cls[status] || '') + '">' + status + '</span>';
}

/* ===== RENDER ===== */
function render() {
  const leads = getLeads();
  if (currentPage === 'dashboard') renderDashboard(leads);
  else if (currentPage === 'leads') renderLeads(leads);
  else if (currentPage === 'followups') renderFollowups(leads);
}

function renderDashboard(leads) {
  const total = leads.length;
  const converted = leads.filter(l => l.status === 'Converted').length;
  const pending = leads.filter(l => l.status === 'New' || l.status === 'Contacted').length;
  const lost = leads.filter(l => l.status === 'Lost').length;
  const recent = [...leads].sort((a, b) => b.createdAt.localeCompare(a.createdAt)).slice(0, 5);

  let html = '<h2 class="page-title">Dashboard</h2>';
  html += '<div class="stats-grid">';
  const stats = [
    { label: 'Total Leads', value: total, iconClass: 'icon-primary', icon: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
    { label: 'Converted', value: converted, iconClass: 'icon-success', icon: '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/>' },
    { label: 'Pending', value: pending, iconClass: 'icon-warning', icon: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>' },
    { label: 'Lost', value: lost, iconClass: 'icon-destructive', icon: '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="18" y1="8" x2="23" y2="13"/><line x1="23" y1="8" x2="18" y2="13"/>' }
  ];
  stats.forEach((s, i) => {
    html += '<div class="stat-card" style="animation-delay:' + (i * 80) + 'ms"><div class="top"><span>' + s.label + '</span><div class="icon ' + s.iconClass + '"><svg width="20" height="20" viewBox="0 0 24 24">' + s.icon + '</svg></div></div><p class="value animate-count-up">' + s.value + '</p></div>';
  });
  html += '</div>';

  html += '<div class="recent-card"><div class="header">Recent Leads</div>';
  if (recent.length === 0) {
    html += '<div class="empty">No leads yet. Add your first lead to get started!</div>';
  } else {
    recent.forEach(l => {
      html += '<div class="recent-item"><div><p class="name">' + esc(l.name) + '</p><p class="company">' + esc(l.company || '—') + '</p></div>' + badgeHTML(l.status) + '</div>';
    });
  }
  html += '</div>';
  document.getElementById('page-dashboard').innerHTML = html;
}

function renderLeads(leads) {
  const filtered = leads.filter(l => {
    const q = searchQuery.toLowerCase();
    const matchSearch = l.name.toLowerCase().includes(q) || l.email.toLowerCase().includes(q) || (l.company || '').toLowerCase().includes(q);
    const matchStatus = statusFilter === 'All' || l.status === statusFilter;
    return matchSearch && matchStatus;
  });

  let html = '<div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:1.25rem"><h2 class="page-title" style="margin-bottom:0">Leads</h2><button class="btn btn-primary" onclick="openAddModal()"><svg width="16" height="16" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add Lead</button></div>';

  html += '<div class="leads-toolbar"><div class="search-wrap"><svg width="16" height="16" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="input input-icon" placeholder="Search leads..." value="' + esc(searchQuery) + '" oninput="searchQuery=this.value;render()"/></div>';
  html += '<div class="filter-bar">';
  ['All','New','Contacted','Converted','Lost'].forEach(s => {
    html += '<button class="filter-btn' + (statusFilter === s ? ' active' : '') + '" onclick="statusFilter=\'' + s + '\';render()">' + s + '</button>';
  });
  html += '</div></div>';

  if (filtered.length === 0) {
    html += '<div class="empty-state"><p>' + (leads.length === 0 ? 'No leads yet. Add your first lead!' : 'No leads match your search.') + '</p></div>';
  } else {
    filtered.forEach(l => {
      html += '<div class="lead-card"><div class="lead-card-inner"><div class="lead-info"><div class="name-row"><h3>' + esc(l.name) + '</h3>' + badgeHTML(l.status) + '</div><p class="detail">' + esc(l.email) + ' · ' + esc(l.company || 'No company') + '</p>';
      if (l.phone) html += '<p class="detail">' + esc(l.phone) + '</p>';
      if (l.notes) html += '<p class="notes line-clamp-1">' + esc(l.notes) + '</p>';
      html += '</div><div class="lead-actions"><div class="status-select"><select onchange="changeStatus(\'' + l.id + '\',this.value)">';
      ['New','Contacted','Converted','Lost'].forEach(s => { html += '<option' + (l.status === s ? ' selected' : '') + '>' + s + '</option>'; });
      html += '</select><svg width="12" height="12" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>';
      html += '<button class="icon-btn" onclick="openEditModal(\'' + l.id + '\')"><svg width="16" height="16" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>';
      html += '<button class="icon-btn delete" onclick="deleteLead(\'' + l.id + '\')"><svg width="16" height="16" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>';
      html += '</div></div></div>';
    });
  }
  document.getElementById('page-leads').innerHTML = html;
}

function renderFollowups(leads) {
  const today = new Date().toISOString().split('T')[0];
  const withFU = leads.filter(l => l.followUpDate && l.status !== 'Converted' && l.status !== 'Lost').sort((a, b) => a.followUpDate.localeCompare(b.followUpDate));
  const overdue = withFU.filter(l => l.followUpDate < today);
  const upcoming = withFU.filter(l => l.followUpDate >= today);

  let html = '<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem"><svg width="24" height="24" viewBox="0 0 24 24" style="color:var(--primary)"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><h2 class="page-title" style="margin-bottom:0">Follow-ups</h2></div>';

  if (withFU.length === 0) {
    html += '<div class="followup-empty"><svg width="48" height="48" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>No follow-ups scheduled</p><p class="sub">Add a follow-up date when creating or editing a lead.</p></div>';
  } else {
    html += renderFUSection(overdue, 'Overdue', true);
    html += renderFUSection(upcoming, 'Upcoming', false);
  }
  document.getElementById('page-followups').innerHTML = html;
}

function renderFUSection(items, label, isOverdue) {
  let html = '<div class="followup-section"><h3>';
  if (isOverdue) html += '<svg width="20" height="20" viewBox="0 0 24 24" style="color:var(--destructive)"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';
  html += label + ' <span class="count">(' + items.length + ')</span></h3>';
  if (items.length === 0) {
    html += '<p class="followup-none">None</p>';
  } else {
    items.forEach(l => {
      html += '<div class="followup-card' + (isOverdue ? ' overdue' : '') + '"><div class="row"><div><p style="font-weight:500">' + esc(l.name) + '</p><p style="font-size:.875rem;color:var(--muted-fg)">' + esc(l.company || l.email) + '</p></div><div class="right">' + badgeHTML(l.status) + '<span class="date' + (isOverdue ? ' overdue-text' : '') + '">' + l.followUpDate + '</span></div></div>';
      if (l.notes) html += '<p class="notes">' + esc(l.notes) + '</p>';
      html += '</div>';
    });
  }
  html += '</div>';
  return html;
}

/* ===== LEAD CRUD ===== */
function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Lead';
  document.getElementById('modalSubmitBtn').textContent = 'Add Lead';
  document.getElementById('leadForm').reset();
  document.getElementById('leadModal').style.display = 'flex';
}

function openEditModal(id) {
  const lead = getLeads().find(l => l.id === id);
  if (!lead) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Edit Lead';
  document.getElementById('modalSubmitBtn').textContent = 'Update';
  document.getElementById('f-name').value = lead.name;
  document.getElementById('f-email').value = lead.email;
  document.getElementById('f-phone').value = lead.phone || '';
  document.getElementById('f-company').value = lead.company || '';
  document.getElementById('f-status').value = lead.status;
  document.getElementById('f-followup').value = lead.followUpDate || '';
  document.getElementById('f-notes').value = lead.notes || '';
  document.getElementById('leadModal').style.display = 'flex';
}

function closeModal() { document.getElementById('leadModal').style.display = 'none'; editingId = null; }

document.getElementById('leadModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

document.getElementById('leadForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const data = {
    name: document.getElementById('f-name').value,
    email: document.getElementById('f-email').value,
    phone: document.getElementById('f-phone').value,
    company: document.getElementById('f-company').value,
    status: document.getElementById('f-status').value,
    followUpDate: document.getElementById('f-followup').value,
    notes: document.getElementById('f-notes').value
  };
  const leads = getLeads();
  if (editingId) {
    const idx = leads.findIndex(l => l.id === editingId);
    if (idx !== -1) leads[idx] = { ...leads[idx], ...data };
  } else {
    leads.push({ ...data, id: uuid(), createdAt: new Date().toISOString() });
  }
  saveLeads(leads);
  closeModal();
  render();
});

function deleteLead(id) {
  if (!confirm('Delete this lead?')) return;
  saveLeads(getLeads().filter(l => l.id !== id));
  render();
}

function changeStatus(id, status) {
  const leads = getLeads();
  const idx = leads.findIndex(l => l.id === id);
  if (idx !== -1) { leads[idx].status = status; saveLeads(leads); render(); }
}

/* ===== ESCAPE HTML ===== */
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
</script>
</body>
</html>
